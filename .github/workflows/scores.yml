name: Scores en direct
on:
  schedule:
    - cron: "*/15 * * * *"
  workflow_dispatch: {}
concurrency:
  group: scores
  cancel-in-progress: false
jobs:
  scores:
    runs-on: ubuntu-latest
    steps:
      - name: Recuperer le depot
        uses: actions/checkout@v4
      - name: Installer Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Generer scores.json
        env:
          RAPIDAPI_KEY: ${{ secrets.RAPIDAPI_KEY }}
        run: node fetch-scores.js
      - name: Deposer scores.json sur free.fr (FTP)
        env:
          FTP_SERVER: ${{ secrets.FTP_SERVER }}
          FTP_USER: ${{ secrets.FTP_USER }}
          FTP_PASSWORD: ${{ secrets.FTP_PASSWORD }}
          FTP_DIR: ${{ secrets.FTP_DIR }}
        run: |
          sudo apt-get update -qq && sudo apt-get install -y -qq lftp
          lftp -u "$FTP_USER","$FTP_PASSWORD" "$FTP_SERVER" -e "
            set ftp:ssl-allow no;
            set net:timeout 20; set net:max-retries 2;
            cd \"${FTP_DIR:-/}\";
            put -O . scores.json;
            bye"
